name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Go CLI ──────────────────────────────────────────────
  cli-test:
    name: CLI — Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.26']
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: cli/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: CGO_ENABLED=0 go build -o bin/git-ai ./cmd/git-ai/

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:CGO_ENABLED="0"
          go build -o bin/git-ai.exe ./cmd/git-ai/

      - name: Test
        run: go test ./internal/... -v -race -coverprofile=coverage.out

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cli/coverage.out

  cli-lint:
    name: CLI — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: cli/go.sum

      - name: Download dependencies
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: cli
          args: --timeout=5m

  # ── VS Code Extension ──────────────────────────────────
  vscode-build:
    name: VS Code — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

  # ── IntelliJ Plugin ────────────────────────────────────
  idea-build:
    name: IntelliJ — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: idea-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: idea-plugin
          path: idea-plugin/build/distributions/*.zip
