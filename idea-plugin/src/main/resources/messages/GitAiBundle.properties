settings.hint.maxDiffTokens=Upper limit of git diff tokens sent to the LLM to prevent context overflow.
settings.hint.uiLanguage=<html>Language for CLI terminal output and system notifications.<br>Leave empty to auto-detect from system LANG. Options: <b>en</b> / <b>zh</b></html>
