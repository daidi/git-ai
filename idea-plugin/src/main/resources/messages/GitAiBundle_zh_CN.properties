# IntelliJ Properties File (zh_CN)
settings.title=git-ai 偏好设置
settings.subtitle=当前项目配置将覆盖全局约定。若属性留空，将自动继承全局值。
settings.tab.global=全局 (共享)
settings.tab.project=当前项目 (覆盖)
settings.project.tooltip=为该代码仓库配置独立的模型参数覆盖
settings.project.tooltip.disabled=打开一个工程后即可配置项目级设定

# Section Titles
settings.section.auth=鉴权与大模型供应商
settings.section.format=Commit 格式化规范
settings.section.behavior=自动推送行为

# Fields
settings.field.provider=接口通道 (Provider)
settings.field.apiKey=API 密钥 (API Key)
settings.field.baseUrl=服务基址 (Base URL)
settings.field.model=模型标识 (Model)
settings.field.messageFormat=消息结构 (Format)
settings.field.language=生成语言 (Language)
settings.field.promptTemplate=自定义系统提示 (Prompt)
settings.field.pushPolicy=推送时机 (Push Policy)
settings.field.maxDiffTokens=Diff 截断阈值 (Tokens)

# Hints
settings.hint.apiKey=您的 LLM 鉴权密钥。该配置将保存在本地系统 config.json/git-ai.json 中。
settings.hint.promptTemplate=覆盖内置的提交指令。留空则使用内置的高水平自动规约指引。
settings.hint.pushPolicy=<html><b>queue (队列)</b>: AI 润色完成后，后台静默自动 Push 到远端<br><b>block (阻断)</b>: 本次 Push 将被拦截，您可以预览 AI 提交结果后重新执行 Push</html>
settings.hint.maxDiffTokens=传输给大模型的最长代码变更 Token 数。超过该值将进行三级截断，避免超出窗口。

# Placeholders
settings.inherit.label=\u2190 继承全局
settings.inherit.value=\u2190 继承: {0}
