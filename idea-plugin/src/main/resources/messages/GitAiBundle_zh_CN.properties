plugin.name=Git AI - 异步提交润色工具
plugin.description=<![CDATA[\
<h3>先提交，后思考。</h3>\
<br/>\
<p>再也不用在终端里等待 AI 生成提交语了。<b>Git AI</b> 深入集成您的常规 Git 工作流，利用大语言模型 (DeepSeek, OpenAI, Ollama) 将您的提交语重写为清晰、规范的 Conventional Commits \u2014\u2014 全异步且静默执行。</p>\
<br/>\
<p>您只需输入 <code>git commit -m "修复 bug"</code> 然后继续写代码。几秒钟后，它会在后台静默转变为 <code>fix(auth): 修复移动端会话超时问题</code>。</p>\
<br/>\
<p><b>核心特性：</b></p>\
<ul>\
    <li><b>零阻力体验</b> \u2014 瞬时保存 IDE 状态快照，您的代码立即入库安全，绝不阻塞终端或 IDE 的编码心流。</li>\
    <li><b>延期优先推送</b> \u2014 若 AI 正在工作，Push 操作会自动进入队列，并在润色完成后静默执行。</li>\
    <li><b>实时状态栏</b> \u2014 在 IDE 底部实时查看 Git AI 守护进程的润色状态。</li>\
    <li><b>原生工具窗口</b> \u2014 在 IntelliJ 内部直接查看后台进程日志和追踪信息。</li>\
    <li><b>提交历史 UI</b> \u2014 原生支持撤销修改、重试润色或终止请求的快捷操作。</li>\
    <li><b>可视化设置</b> \u2014 在偏好设置中图形化配置 API 密钥和供应商 (DeepSeek, OpenAI, 本地 Ollama)，全面支持国际化。</li>\
</ul>\
<br/>\
]]>

